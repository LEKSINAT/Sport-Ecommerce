<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth View</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="auth">
    <div class="inner-shell">
      <header class="page-header">
        <a class="back-link" href="/">Back to overview</a>
        <h1>Authentication View</h1>
        <p>Starter screens for sign up, sign in, and current user lookup.</p>
      </header>

      <section class="stack-grid">
        <article class="panel">
          <h2>Register</h2>
          <form class="form-grid">
            <input type="text" placeholder="Full name" />
            <input type="email" placeholder="Email" />
            <input type="password" placeholder="Password" />
            <select>
              <option>customer</option>
              <option>admin</option>
              <option>manager</option>
            </select>
            <button type="button">Create account</button>
          </form>
        </article>

        <article class="panel">
          <h2>Login</h2>
          <form class="form-grid">
            <input type="email" placeholder="Email" />
            <input type="password" placeholder="Password" />
            <button type="button">Sign in</button>
          </form>
        </article>

        <article class="panel">
          <h2>Mapped endpoints</h2>
          <ul class="api-list">
            <li><code>POST /api/auth/register</code></li>
            <li><code>POST /api/auth/login</code></li>
            <li><code>GET /api/auth/me</code></li>
          </ul>
        </article>
      </section>
    </div>
  </body>
</html>
