<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payments View</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="payments">
    <div class="inner-shell">
      <header class="page-header">
        <a class="back-link" href="/">Back to overview</a>
        <h1>Payments View</h1>
        <p>Starter panel for payment intents, verification, and gateway status.</p>
      </header>

      <section class="stack-grid">
        <article class="panel">
          <h2>Create payment</h2>
          <form class="form-grid">
            <input type="text" placeholder="Order ID" />
            <input type="number" placeholder="Amount" />
            <input type="text" placeholder="Currency" value="USD" />
            <input type="text" placeholder="Provider" value="mock-gateway" />
            <button type="button">Create payment</button>
          </form>
        </article>

        <article class="panel">
          <h2>Verify payment</h2>
          <form class="form-grid">
            <input type="text" placeholder="Payment reference" />
            <button type="button">Verify</button>
          </form>
        </article>

        <article class="panel">
          <h2>Mapped endpoints</h2>
          <ul class="api-list">
            <li><code>POST /api/payments</code></li>
            <li><code>GET /api/payments/:reference</code></li>
          </ul>
        </article>
      </section>
    </div>
  </body>
</html>
